<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeluaPlay - Modern Ultimate Lejátszó</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>          <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>       <script src="https://cdn.jsdelivr.net/npm/flv.js@latest/dist/flv.min.js"></script> <style>
        /* Modern görgetősáv */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        
        /* Videó konténer arányainak megtartása */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 arány */
            height: 0;
            overflow: hidden;
            background-color: #000;
            border-radius: 0.75rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            border: 1px solid #374151;
        }
        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            outline: none;
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans selection:bg-blue-500 selection:text-white">

    <header class="bg-gray-900 shadow-lg border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3 text-blue-500">
                <i class="fa-solid fa-play-circle text-3xl"></i>
                <h1 class="text-2xl font-bold text-white tracking-wide">Melua<span class="text-blue-500">Play</span> <span class="text-sm font-normal text-gray-400 ml-2 hidden sm:inline-block">Ultimate</span></h1>
            </div>
            <div class="flex gap-2">
                <span class="bg-blue-900 border border-blue-700 text-blue-300 text-xs font-semibold px-2.5 py-1 rounded shadow-sm">
                    MP4 • MKV • AVI • FLV • M3U8 • MPD
                </span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col lg:flex-row gap-8">
        
        <div class="flex-1 space-y-6">
            
            <div class="bg-gray-900 rounded-2xl p-4 shadow-2xl border border-gray-800">
                <div class="video-container group">
                    <video id="videoPlayer" controls crossorigin="anonymous"></video>
                </div>
                <div class="mt-5 flex items-center justify-between px-2">
                    <h2 id="nowPlayingTitle" class="text-xl font-bold text-gray-100 truncate pr-4">Nincs kiválasztott média</h2>
                    <span id="streamTypeBadge" class="hidden text-xs font-bold px-3 py-1.5 rounded-md tracking-wider uppercase"></span>
                </div>
            </div>

            <div class="bg-gray-900 rounded-2xl p-6 shadow-xl border border-gray-800">
                <h3 class="text-lg font-semibold mb-4 text-gray-200"><i class="fa-solid fa-link mr-2 text-blue-500"></i>Média URL megadása</h3>
                <form id="streamForm" class="flex flex-col sm:flex-row gap-3">
                    <input type="text" id="streamUrl" placeholder="Videó link (pl. .mkv, .mp4, .m3u8, .flv)" 
                           class="flex-1 bg-gray-950 border border-gray-700 text-white text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-3.5 transition-colors" required>
                    <input type="text" id="streamName" placeholder="Megnevezés (opcionális)" 
                           class="w-full sm:w-48 bg-gray-950 border border-gray-700 text-white text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-3.5 transition-colors">
                    <button type="submit" class="text-white bg-blue-600 hover:bg-blue-500 focus:ring-4 focus:outline-none focus:ring-blue-800 font-bold rounded-lg text-sm px-6 py-3.5 text-center transition-all shadow-lg hover:shadow-blue-500/30">
                        <i class="fa-solid fa-play mr-2"></i> Indítás
                    </button>
                </form>
                
                <div class="mt-5 flex flex-wrap items-center bg-gray-950 p-3 rounded-lg border border-gray-800 w-fit gap-6">
                    <div class="flex items-center">
                        <input type="checkbox" id="autoFullscreen" class="w-4 h-4 text-blue-600 bg-gray-800 border-gray-600 rounded focus:ring-blue-500 focus:ring-2 cursor-pointer" checked>
                        <label for="autoFullscreen" class="ml-2 text-sm font-medium text-gray-300 cursor-pointer select-none">Auto Fullscreen</label>
                    </div>
                    
                    <div class="flex items-center border-l border-gray-800 pl-6">
                        <input type="checkbox" id="useCodetabsProxy" class="w-4 h-4 text-green-500 bg-gray-800 border-gray-600 rounded focus:ring-green-500 focus:ring-2 cursor-pointer" checked>
                        <label for="useCodetabsProxy" class="ml-2 text-sm font-medium text-gray-300 cursor-pointer select-none"><i class="fa-solid fa-shield-halved text-green-500 mr-1"></i> Codetabs Proxy</label>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full lg:w-96 space-y-6">
            <div class="bg-gray-900 rounded-2xl shadow-xl border border-gray-800 overflow-hidden flex flex-col h-[650px]">
                <div class="p-5 border-b border-gray-800 bg-gray-900/50 flex justify-between items-center backdrop-blur-sm">
                    <h3 class="text-lg font-semibold text-gray-200"><i class="fa-solid fa-history mr-2 text-blue-500"></i>Előzmények</h3>
                    <button id="clearHistoryBtn" class="text-gray-500 hover:text-red-500 hover:bg-red-500/10 p-2 rounded-lg transition-colors" title="Előzmények törlése">
                        <i class="fa-solid fa-trash-alt"></i>
                    </button>
                </div>
                
                <div class="flex-1 overflow-y-auto p-3 space-y-2" id="playlistContainer">
                    </div>
            </div>
        </div>
    </main>

    <script>
        // DOM Elemek
        const videoElement = document.getElementById('videoPlayer');
        const nowPlayingTitle = document.getElementById('nowPlayingTitle');
        const streamTypeBadge = document.getElementById('streamTypeBadge');
        const playlistContainer = document.getElementById('playlistContainer');
        const streamForm = document.getElementById('streamForm');
        
        // Lejátszó példányok
        let hlsPlayer = null;
        let dashPlayer = null;
        let flvPlayer = null;

        // Példa streamek
        const defaultStreams = [
            { name: "Példa HLS (.m3u8)", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
            { name: "Példa DASH (.mpd)", url: "https://dash.akamaized.net/akamai/bbb_30fps/bbb_30fps.mpd" },
            { name: "Példa MP4", url: "http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" }
        ];

        // Előzmények betöltése
        let streamHistory = JSON.parse(localStorage.getItem('meluaPlayHistory_v3')) || defaultStreams;

        // Lejátszók takarítása váltáskor
        function destroyAllPlayers() {
            if (hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }
            if (dashPlayer) { dashPlayer.reset(); dashPlayer = null; }
            if (flvPlayer) { flvPlayer.destroy(); flvPlayer = null; }
            videoElement.src = "";
            videoElement.removeAttribute('src');
            videoElement.load(); // Reset native player state
        }

        // Fő lejátszó logika (Több formátum támogatása)
        function playStream(originalUrl, name) {
            destroyAllPlayers();
            
            // UI Frissítése
            nowPlayingTitle.textContent = name || "Ismeretlen média";
            streamTypeBadge.classList.remove('hidden');

            // --- PROXY LOGIKA ---
            const useProxy = document.getElementById('useCodetabsProxy').checked;
            let playUrl = originalUrl;
            
            if (useProxy) {
                playUrl = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(originalUrl)}`;
                console.log("Codetabs proxy aktív: ", playUrl);
            }

            // Mindig az eredeti URL kiterjesztését vizsgáljuk
            const lowercaseOriginalUrl = originalUrl.toLowerCase();
            
            // 1. HLS (.m3u8)
            if (lowercaseOriginalUrl.includes('.m3u8')) {
                setUIBadge(useProxy ? "HLS (PROXY)" : "HLS", "bg-purple-900 text-purple-300 border border-purple-700");
                if (Hls.isSupported()) {
                    hlsPlayer = new Hls({ 
                        debug: false,
                        xhrSetup: function(xhr, url) {
                            xhr.withCredentials = false; // Fontos a proxy működéséhez
                        }
                    });
                    hlsPlayer.loadSource(playUrl);
                    hlsPlayer.attachMedia(videoElement);
                    hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => videoElement.play().catch(e=>console.log(e)));
                } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                    videoElement.src = playUrl;
                    videoElement.addEventListener('loadedmetadata', () => videoElement.play());
                } else {
                    alert("A böngésződ nem támogatja a HLS lejátszást.");
                }
            } 
            // 2. DASH (.mpd)
            else if (lowercaseOriginalUrl.includes('.mpd')) {
                setUIBadge(useProxy ? "DASH (PROXY)" : "DASH", "bg-orange-900 text-orange-300 border border-orange-700");
                dashPlayer = dashjs.MediaPlayer().create();
                dashPlayer.initialize(videoElement, playUrl, true);
            } 
            // 3. FLV (.flv)
            else if (lowercaseOriginalUrl.includes('.flv')) {
                setUIBadge(useProxy ? "FLV (PROXY)" : "FLV", "bg-red-900 text-red-300 border border-red-700");
                if (flvjs.isSupported()) {
                    flvPlayer = flvjs.createPlayer({ type: 'flv', url: playUrl });
                    flvPlayer.attachMediaElement(videoElement);
                    flvPlayer.load();
                    flvPlayer.play().catch(e=>console.log(e));
                } else {
                    alert("A böngésződ nem támogatja az FLV formátumot.");
                }
            }
            // 4. MKV / AVI (Kísérleti natív támogatás)
            else if (lowercaseOriginalUrl.includes('.mkv') || lowercaseOriginalUrl.includes('.avi')) {
                setUIBadge(useProxy ? "MKV/AVI (PROXY)" : "NATIVE MKV/AVI", "bg-yellow-900 text-yellow-300 border border-yellow-700");
                videoElement.src = playUrl;
                videoElement.play().catch(e => console.log("Automatikus lejátszás blokkolva"));
            }
            // 5. Standard MP4 / WEBM / MOV / Egyéb
            else {
                setUIBadge(useProxy ? "MP4 (PROXY)" : "MP4 / WEBM", "bg-blue-900 text-blue-300 border border-blue-700");
                videoElement.src = playUrl;
                videoElement.play().catch(e => console.log("Automatikus lejátszás blokkolva"));
            }

            // Mindig az eredeti URL-t mentjük az előzményekbe!
            saveToHistory(originalUrl, name);

            // Dinamikus URL frissítés (szintén az eredeti URL-lel)
            try {
                if (!window.location.href.startsWith('blob:')) {
                    const currentUrl = new URL(window.location.href);
                    currentUrl.searchParams.set('url', originalUrl);
                    if (name) currentUrl.searchParams.set('name', name);
                    else currentUrl.searchParams.delete('name');
                    window.history.pushState({path: currentUrl.href}, '', currentUrl.href);
                }
            } catch (error) {}

            // Automatikus teljes képernyő (első indításkor késleltetve)
            const autoFullscreen = document.getElementById('autoFullscreen');
            if (autoFullscreen && autoFullscreen.checked) {
                setTimeout(() => {
                    if (videoElement.requestFullscreen) {
                        videoElement.requestFullscreen().catch(err => console.log(err));
                    } else if (videoElement.webkitRequestFullscreen) {
                        videoElement.webkitRequestFullscreen();
                    }
                }, 400);
            }
        }

        function setUIBadge(text, classes) {
            streamTypeBadge.textContent = text;
            streamTypeBadge.className = `text-xs font-bold px-3 py-1.5 rounded-md tracking-wider uppercase ${classes}`;
        }

        // Előzmények kezelése
        function saveToHistory(url, name) {
            const displayName = name || url.split('/').pop() || "Új Média";
            const existsIndex = streamHistory.findIndex(s => s.url === url);
            
            if (existsIndex > -1) {
                const existing = streamHistory.splice(existsIndex, 1)[0];
                existing.name = displayName; 
                streamHistory.unshift(existing);
            } else {
                streamHistory.unshift({ name: displayName, url: url });
            }

            if (streamHistory.length > 30) streamHistory.pop();
            localStorage.setItem('meluaPlayHistory_v3', JSON.stringify(streamHistory));
            renderPlaylist();
        }

        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            
            if (streamHistory.length === 0) {
                playlistContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-40 text-gray-500">
                        <i class="fa-solid fa-folder-open text-3xl mb-3 opacity-50"></i>
                        <p class="text-sm">Nincsenek mentett média fájlok.</p>
                    </div>`;
                return;
            }

            streamHistory.forEach(stream => {
                const item = document.createElement('div');
                item.className = "flex items-center justify-between p-3 bg-gray-950 rounded-xl hover:bg-gray-800 cursor-pointer transition-all border border-gray-800 hover:border-blue-500 group";
                
                let iconClass = "fa-film text-blue-400"; // Default
                const lUrl = stream.url.toLowerCase();
                if(lUrl.includes('.m3u8')) iconClass = "fa-broadcast-tower text-purple-400";
                else if(lUrl.includes('.mpd')) iconClass = "fa-satellite-dish text-orange-400";
                else if(lUrl.includes('.flv')) iconClass = "fa-fire text-red-400";
                else if(lUrl.includes('.mkv') || lUrl.includes('.avi')) iconClass = "fa-file-video text-yellow-400";

                item.innerHTML = `
                    <div class="flex items-center overflow-hidden pr-3 w-full">
                        <div class="w-12 h-12 rounded-lg bg-gray-900 flex items-center justify-center flex-shrink-0 mr-4 shadow-inner group-hover:bg-black transition-colors">
                            <i class="fa-solid ${iconClass} text-lg"></i>
                        </div>
                        <div class="truncate flex-1">
                            <p class="text-sm font-bold text-gray-200 truncate group-hover:text-blue-400 transition-colors">${stream.name}</p>
                            <p class="text-xs text-gray-500 truncate mt-1">${stream.url}</p>
                        </div>
                    </div>
                    <button class="play-btn text-gray-600 group-hover:text-blue-500 transition-colors p-2" title="Lejátszás">
                        <i class="fa-solid fa-play"></i>
                    </button>
                `;

                item.addEventListener('click', () => {
                    document.getElementById('streamUrl').value = stream.url;
                    document.getElementById('streamName').value = stream.name;
                    playStream(stream.url, stream.name);
                });
                
                playlistContainer.appendChild(item);
            });
        }

        // --- ÚJ FUNKCIÓ: AUTOMATIKUS TELJES KÉPERNYŐ INDÍTÁSKOR/FOLYTATÁSKOR ---
        videoElement.addEventListener('play', () => {
            const autoFullscreen = document.getElementById('autoFullscreen');
            
            // Ha be van pipálva az "Auto Fullscreen" és jelenleg nincs teljes képernyőn
            if (autoFullscreen && autoFullscreen.checked && !document.fullscreenElement) {
                if (videoElement.requestFullscreen) {
                    videoElement.requestFullscreen().catch(err => console.log("Fullscreen blokkolva:", err));
                } else if (videoElement.webkitRequestFullscreen) { /* Safari */
                    videoElement.webkitRequestFullscreen();
                }
            }
        });

        // Eseménykezelők
        streamForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const url = document.getElementById('streamUrl').value.trim();
            const name = document.getElementById('streamName').value.trim();
            if (url) {
                playStream(url, name);
            }
        });

        document.getElementById('clearHistoryBtn').addEventListener('click', () => {
            if(confirm('Biztosan törölni szeretnéd az összes előzményt?')) {
                streamHistory = [];
                localStorage.removeItem('meluaPlayHistory_v3');
                renderPlaylist();
            }
        });

        // Videó Dupla kattintás - Teljes képernyő (mint a klasszikusban)
        videoElement.addEventListener('dblclick', () => {
            if (!document.fullscreenElement) {
                if (videoElement.requestFullscreen) videoElement.requestFullscreen();
                else if (videoElement.webkitRequestFullscreen) videoElement.webkitRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        });

        // Inicializálás
        renderPlaylist();

        // URL paraméterek ellenőrzése
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const streamUrl = urlParams.get('url');
            const streamName = urlParams.get('name');
            
            if (streamUrl) {
                document.getElementById('streamUrl').value = streamUrl;
                if(streamName) document.getElementById('streamName').value = streamName;
                setTimeout(() => playStream(streamUrl, streamName), 300);
            }
        });

    </script>
</body>
</html>
