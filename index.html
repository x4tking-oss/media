<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeluaPlay - Kétcsatornás Lejátszó</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>          
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>       
    <script src="https://cdn.jsdelivr.net/npm/flv.js@latest/dist/flv.min.js"></script> 
    
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background-color: #000;
            border-radius: 0.75rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            border: 1px solid #374151;
        }
        .video-container video, .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            outline: none;
            border: none;
        }
        
        video::cue {
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            font-size: 1.2rem;
            font-family: sans-serif;
        }

        .loader {
            border: 3px solid #1f2937;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans selection:bg-blue-500 selection:text-white">

    <header class="bg-gray-900 shadow-lg border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3 text-blue-500">
                <i class="fa-solid fa-play-circle text-3xl"></i>
                <h1 class="text-2xl font-bold text-white tracking-wide">Melua<span class="text-blue-500">Play</span></h1>
            </div>
            <div class="hidden sm:flex gap-2">
                <span class="bg-blue-900 border border-blue-700 text-blue-300 text-xs font-semibold px-2.5 py-1 rounded shadow-sm uppercase">Kétcsatornás mód</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col lg:flex-row gap-8">
        
        <div class="flex-1 space-y-6">
            
            <!-- Státusz visszajelző -->
            <div id="hunterStatus" class="hidden bg-blue-900/40 border border-blue-700 rounded-xl p-4 flex items-center justify-between gap-3">
                <div class="flex items-center gap-3">
                    <div class="loader" id="statusLoader"></div>
                    <span class="text-blue-300 text-sm font-semibold" id="hunterText">Weboldal elemzése...</span>
                </div>
            </div>

            <div class="bg-gray-900 rounded-2xl p-4 shadow-2xl border border-gray-800">
                <div class="video-container group">
                    <video id="videoPlayer" crossorigin="anonymous" controls playsinline></video>
                    <iframe id="iframePlayer" class="hidden" allowfullscreen allow="autoplay; fullscreen"></iframe>
                </div>
                
                <div class="mt-5 flex items-center justify-between px-2 flex-wrap gap-3">
                    <h2 id="nowPlayingTitle" class="text-xl font-bold text-gray-100 truncate flex-1 min-w-[200px]">Nincs kiválasztott média</h2>
                    
                    <div class="flex items-center gap-3">
                        <!-- Felirat választó (ha több is van) -->
                        <div id="subtitleContainer" class="hidden flex items-center gap-2 bg-gray-800 border border-gray-700 px-3 py-1.5 rounded-lg transition-all">
                            <i class="fa-solid fa-closed-captioning text-gray-400"></i>
                            <select id="subtitleSelector" class="bg-transparent text-sm font-semibold text-white outline-none cursor-pointer">
                                <option value="-1">Felirat: Ki</option>
                            </select>
                        </div>
                        <span id="streamTypeBadge" class="hidden text-xs font-bold px-3 py-1.5 rounded-md tracking-wider uppercase"></span>
                    </div>
                </div>
            </div>

            <!-- KÉT LINKES BEVITELI MEZŐ -->
            <div class="bg-gray-900 rounded-2xl p-6 shadow-xl border border-gray-800">
                <h3 class="text-lg font-semibold mb-4 text-gray-200"><i class="fa-solid fa-link mr-2 text-blue-500"></i>Média és Felirat megadása</h3>
                
                <form id="streamForm" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-500 uppercase ml-1">Videó Link / Weboldal</label>
                            <input type="text" id="streamUrl" placeholder="Pl: .m3u8, .mp4 vagy filmoldal.hu" 
                                   class="w-full bg-gray-950 border border-gray-700 text-white text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-3.5 transition-colors" required>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-500 uppercase ml-1">Külön Felirat Link (Opcionális)</label>
                            <input type="text" id="subtitleUrl" placeholder="Pl: felirat.vtt vagy .srt" 
                                   class="w-full bg-gray-950 border border-gray-700 text-white text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-3.5 transition-colors">
                        </div>
                    </div>
                    
                    <div class="flex flex-col sm:flex-row gap-4 items-end">
                        <div class="flex-1 space-y-2 w-full">
                            <label class="text-xs font-bold text-gray-500 uppercase ml-1">Megnevezés</label>
                            <input type="text" id="streamName" placeholder="Film vagy sorozat címe" 
                                   class="w-full bg-gray-950 border border-gray-700 text-white text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-3.5 transition-colors">
                        </div>
                        <button type="submit" class="w-full sm:w-auto text-white bg-blue-600 hover:bg-blue-500 focus:ring-4 focus:outline-none focus:ring-blue-800 font-bold rounded-lg text-sm px-10 py-3.5 text-center transition-all shadow-lg hover:shadow-blue-500/30">
                            <i class="fa-solid fa-play mr-2"></i> Indítás
                        </button>
                    </div>
                </form>
                
                <div class="mt-6 flex flex-wrap items-center bg-gray-950 p-3 rounded-lg border border-gray-800 w-fit gap-6">
                    <div class="flex items-center">
                        <input type="checkbox" id="autoFullscreen" class="w-4 h-4 text-blue-600 bg-gray-800 border-gray-600 rounded focus:ring-blue-500 focus:ring-2 cursor-pointer" checked>
                        <label for="autoFullscreen" class="ml-2 text-sm font-medium text-gray-300 cursor-pointer select-none">Auto Fullscreen</label>
                    </div>
                    <div class="flex items-center border-l border-gray-800 pl-6">
                        <input type="checkbox" id="useProxy" class="w-4 h-4 text-green-500 bg-gray-800 border-gray-600 rounded focus:ring-green-500 focus:ring-2 cursor-pointer" checked>
                        <label for="useProxy" class="ml-2 text-sm font-medium text-gray-300 cursor-pointer select-none"><i class="fa-solid fa-shield-halved text-green-500 mr-1"></i> Proxy (CORS javítás)</label>
                    </div>
                </div>
            </div>
        </div>

        <!-- ELŐZMÉNYEK -->
        <div class="w-full lg:w-96 space-y-6">
            <div class="bg-gray-900 rounded-2xl shadow-xl border border-gray-800 overflow-hidden flex flex-col h-[650px]">
                <div class="p-5 border-b border-gray-800 bg-gray-900/50 flex justify-between items-center backdrop-blur-sm">
                    <h3 class="text-lg font-semibold text-gray-200"><i class="fa-solid fa-history mr-2 text-blue-500"></i>Előzmények</h3>
                    <button id="clearHistoryBtn" class="text-gray-500 hover:text-red-500 hover:bg-red-500/10 p-2 rounded-lg transition-colors">
                        <i class="fa-solid fa-trash-alt"></i>
                    </button>
                </div>
                <div class="flex-1 overflow-y-auto p-3 space-y-2" id="playlistContainer"></div>
            </div>
        </div>
    </main>

    <script>
        const video = document.getElementById('videoPlayer');
        const iframe = document.getElementById('iframePlayer');
        const nowPlaying = document.getElementById('nowPlayingTitle');
        const badge = document.getElementById('streamTypeBadge');
        const playlist = document.getElementById('playlistContainer');
        const form = document.getElementById('streamForm');
        
        const hunterStatus = document.getElementById('hunterStatus');
        const hunterText = document.getElementById('hunterText');
        const loader = document.getElementById('statusLoader');

        let hls = null;
        let dash = null;
        let history = JSON.parse(localStorage.getItem('meluaHistory_v7')) || [];

        // --- WEB VADÁSZ LOGIKA ---
        async function hunter(url, name) {
            hunterStatus.classList.remove('hidden');
            loader.style.display = 'block';
            hunterText.textContent = "Videó és felirat keresése a weboldalon...";
            
            try {
                const proxy = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`;
                const res = await fetch(proxy);
                const html = await res.text();

                const m3u8Match = html.match(/(https?:\/\/[^"'\s>]+?\.m3u8[^"'\s>]*)/i);
                const subMatch = html.match(/(https?:\/\/[^"'\s>]+?\.(vtt|srt)[^"'\s>]*)/i);

                if (m3u8Match) {
                    hunterText.textContent = "Siker! Linkek kinyerve.";
                    setTimeout(() => hunterStatus.classList.add('hidden'), 2000);
                    play(m3u8Match[1], name, subMatch ? subMatch[1] : "");
                } else {
                    throw new Error("Nem található videó link az oldalon.");
                }
            } catch (e) {
                loader.style.display = 'none';
                hunterText.textContent = "Hiba: " + e.message;
                setTimeout(() => hunterStatus.classList.add('hidden'), 4000);
            }
        }

        // --- LEJÁTSZÓ TISZTÍTÁSA ---
        function reset() {
            if (hls) { hls.destroy(); hls = null; }
            if (dash) { dash.reset(); dash = null; }
            video.querySelectorAll('track').forEach(t => t.remove());
            video.src = ""; video.load();
            iframe.src = "";
            video.classList.remove('hidden');
            iframe.classList.add('hidden');
            document.getElementById('subtitleContainer').classList.add('hidden');
        }

        // --- FŐ LEJÁTSZÁS ---
        function play(videoUrl, name, subUrl = "") {
            reset();
            nowPlaying.textContent = name || "Ismeretlen média";
            const useProxy = document.getElementById('useProxy').checked;
            
            let finalVideoUrl = videoUrl;
            let finalSubUrl = subUrl;

            if (useProxy) {
                finalVideoUrl = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(videoUrl)}`;
                if (subUrl) finalSubUrl = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(subUrl)}`;
            }

            // Külön felirat hozzáadása
            if (subUrl) {
                const track = document.createElement('track');
                track.kind = 'subtitles';
                track.label = 'Külső Felirat';
                track.srclang = 'hu';
                track.src = finalSubUrl;
                track.default = true;
                video.appendChild(track);
                
                document.getElementById('subtitleContainer').classList.remove('hidden');
                
                const subSelect = document.getElementById('subtitleSelector');
                subSelect.innerHTML = '<option value="-1">Felirat: Ki</option><option value="ext" selected>Külső Felirat (Aktív)</option>';
                
                // Menü gomb eseménye
                subSelect.onchange = (e) => {
                    const isVisible = e.target.value === 'ext';
                    for(let i=0; i<video.textTracks.length; i++) {
                        video.textTracks[i].mode = isVisible ? 'showing' : 'hidden';
                    }
                };

                // Kőkemény kényszerítés a böngészőnek, hogy jelenítse meg
                track.addEventListener('load', () => {
                    track.track.mode = 'showing';
                });
                
                setTimeout(() => {
                    for(let i=0; i<video.textTracks.length; i++) {
                        video.textTracks[i].mode = 'showing';
                    }
                }, 800);
            }

            const lUrl = videoUrl.toLowerCase();

            if (lUrl.includes('.m3u8')) {
                badge.textContent = "HLS"; badge.className = "text-xs font-bold px-3 py-1.5 rounded-md bg-purple-900 text-purple-300 border border-purple-700";
                if (Hls.isSupported()) {
                    hls = new Hls();
                    hls.loadSource(finalVideoUrl);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                }
            } else if (lUrl.includes('.mpd')) {
                badge.textContent = "DASH"; badge.className = "text-xs font-bold px-3 py-1.5 rounded-md bg-orange-900 text-orange-300 border border-orange-700";
                dash = dashjs.MediaPlayer().create();
                dash.initialize(video, finalVideoUrl, true);
            } else {
                badge.textContent = "DIRECT"; badge.className = "text-xs font-bold px-3 py-1.5 rounded-md bg-blue-900 text-blue-300 border border-blue-700";
                video.src = finalVideoUrl;
                video.play().catch(() => {});
            }

            badge.classList.remove('hidden');
            save(videoUrl, name, subUrl);
            autoFull();
        }

        function autoFull() {
            if (document.getElementById('autoFullscreen').checked) {
                setTimeout(() => {
                    if (video.requestFullscreen) video.requestFullscreen();
                }, 1000);
            }
        }

        function save(url, name, sub) {
            const entry = { url, name: name || url.split('/').pop(), sub };
            history = history.filter(h => h.url !== url);
            history.unshift(entry);
            if (history.length > 20) history.pop();
            localStorage.setItem('meluaHistory_v7', JSON.stringify(history));
            render();
        }

        function render() {
            playlist.innerHTML = '';
            history.forEach(item => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-3 bg-gray-950 rounded-xl border border-gray-800 hover:border-blue-500 cursor-pointer group";
                div.innerHTML = `
                    <div class="truncate flex-1">
                        <p class="text-sm font-bold text-gray-200 truncate group-hover:text-blue-400">${item.name}</p>
                        <p class="text-[10px] text-gray-600 truncate">${item.url}</p>
                    </div>
                    <i class="fa-solid fa-play text-gray-700 group-hover:text-blue-500 ml-3"></i>
                `;
                div.onclick = () => {
                    document.getElementById('streamUrl').value = item.url;
                    document.getElementById('subtitleUrl').value = item.sub;
                    document.getElementById('streamName').value = item.name;
                    play(item.url, item.name, item.sub);
                };
                playlist.appendChild(div);
            });
        }

        form.onsubmit = (e) => {
            e.preventDefault();
            const url = document.getElementById('streamUrl').value.trim();
            const sub = document.getElementById('subtitleUrl').value.trim();
            const name = document.getElementById('streamName').value.trim();
            
            const isDirect = url.includes('.m3u8') || url.includes('.mp4') || url.includes('.mpd');
            if (isDirect) play(url, name, sub);
            else hunter(url, name);
        };

        document.getElementById('clearHistoryBtn').onclick = () => {
            if(confirm('Töröljük az előzményeket?')) { history = []; localStorage.removeItem('meluaHistory_v7'); render(); }
        };

        render();
    </script>
</body>
</html>
